spring.application.name=Hero
server.port=9093
#
### Eureka server URL (change if your Eureka server is hosted elsewhere)
#eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
##
### Enable registration with Eureka
#eureka.client.register-with-eureka=true
##
### Enable fetching registry from Eureka
#eureka.client.fetch-registry=true

spring.datasource.url=jdbc:mysql://localhost:3306/backend
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
